name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore AskNightingale.slnx

      - name: Build
        run: dotnet build AskNightingale.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test AskNightingale.slnx --no-build --configuration Release --verbosity normal
